services:
  - type: web
    name: apuradito-backend
    env: python
    rootDir: backend
    buildCommand: pip install -r requirements.txt
    startCommand: uvicorn app.main:app --host 0.0.0.0 --port $PORT
    plan: free
    envVars:
      - key: DATABASE_URL
        sync: false
      - key: DATABASE_URL_PRODUCTION
        sync: false
      - key: SECRET_KEY
        generateValue: true
      - key: ENVIRONMENT
        value: production
      - key: CORS_ORIGINS
        value: "*"
      - key: DEBUG
        value: "false"

  - type: web
    name: apuradito-frontend
    env: static
    rootDir: frontend
    buildCommand: npm install && npm run build
    publishDir: dist
    plan: free
    envVars:
      - key: VITE_API_URL
        fromService:
          type: web
          name: apuradito-backend
          property: host
      - key: VITE_API_URL_PROD
        fromService:
          type: web
          name: apuradito-backend
          property: host
