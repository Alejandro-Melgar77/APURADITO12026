version: '3.8'

services:
  postgres:
    image: postgis/postgis:16-3.4-alpine
    container_name: apuradito_postgres
    environment:
      POSTGRES_USER: apuradito_user
      POSTGRES_PASSWORD: apuradito_pass_dev
      POSTGRES_DB: apuradito_db
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
      - ./backend/migrations/init.sql:/docker-entrypoint-initdb.d/init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U apuradito_user -d apuradito_db"]
      interval: 10s
      timeout: 5s
      retries: 5

  redis:
    image: redis:7-alpine
    container_name: apuradito_redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 5

volumes:
  postgres_data:
  redis_data:
